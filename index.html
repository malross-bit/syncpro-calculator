<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SyncPro ROI Calculator</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 50px auto; padding: 20px; background: #f4f4f4; }
    h1 { color: #004080; }
    label { display: block; margin-top: 10px; }
    input { padding: 5px; width: 100%; max-width: 200px; margin-top: 5px; }
    .results { margin-top: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<h1>Careview SyncPro Savings Calculator</h1>
<p>Estimate how much time and cost you can save by automating participant budgets and funding periods with SyncPro.</p>

<label>Number of Participants:
    <input type="number" id="numParticipants" value="50">
</label>

<label>Support Categories per Participant:
    <input type="number" id="numCategories" value="5">
</label>

<label>Funding Periods per Category:
    <input type="number" id="numPeriods" value="5">
</label>

<label>Admin Hourly Rate (AUD):
    <input type="number" id="hourlyRate" value="40">
</label>

<label>Time to manually set up 1 funding period (minutes):
    <input type="number" id="timePerPeriod" value="10">
</label>

<div class="results">
    <h2>Results</h2>
    <p>Manual Admin Cost: $<span id="manualCost">0</span></p>
    <p>Automated Admin Cost: $<span id="autoCost">0</span></p>
    <p>SyncPro Subscription Cost: $<span id="syncProCost">0</span></p>
    <p><strong>Total Automated Cost: $<span id="totalAutoCost">0</span></strong></p>
    <p><strong>Estimated Savings: $<span id="savings">0</span></strong></p>
</div>

<script>
function calculate() {
    let participants = parseFloat(document.getElementById('numParticipants').value);
    let categories = parseFloat(document.getElementById('numCategories').value);
    let periods = parseFloat(document.getElementById('numPeriods').value);
    let rate = parseFloat(document.getElementById('hourlyRate').value);
    let manualMinutes = parseFloat(document.getElementById('timePerPeriod').value);

    // Manual cost
    let totalManualMinutes = participants * categories * periods * manualMinutes;
    let manualHours = totalManualMinutes / 60;
    let manualCost = manualHours * rate;

    // Automated cost
    let autoMinutesPerParticipant = 5; // SyncPro sets up budgets in 5 minutes
    let autoHours = (autoMinutesPerParticipant * participants) / 60;
    let autoCost = autoHours * rate;

    // SyncPro subscription
    let subscriptionCost = participants * 1.5;

    let totalAutoCost = autoCost + subscriptionCost;

    // Savings
    let savings = manualCost - totalAutoCost;

    // Update HTML
    document.getElementById('manualCost').innerText = manualCost.toFixed(2);
    document.getElementById('autoCost').innerText = autoCost.toFixed(2);
    document.getElementById('syncProCost').innerText = subscriptionCost.toFixed(2);
    document.getElementById('totalAutoCost').innerText = totalAutoCost.toFixed(2);
    document.getElementById('savings').innerText = savings.toFixed(2);
}

// Run calculation when input changes
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', calculate);
});

// Initial calculation
calculate();
</script>

</body>
</html>
