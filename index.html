<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SyncPro Savings Calculator</title>
<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f9fc; }
    h1 { color: #2c3e50; }

    /* Header */
    .header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
    }
    .header img { max-width: 160px; }

    /* Main layout */
    .calculator-wrapper {
        display: flex;
        gap: 40px;
        align-items: flex-start;
        flex-wrap: wrap;
    }

    /* LEFT: Inputs */
    .inputs {
        flex: 1;
        min-width: 300px;
    }

    /* RIGHT: Results (PROMINENT) */
    .results {
        flex: 0 0 320px;
        background: #eef5ff;
        padding: 25px;
        border-radius: 12px;
        border: 2px solid #1a73e8;
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        position: sticky;
        top: 20px; /* stays visible while scrolling */
    }

    .results p {
        margin: 12px 0;
        font-size: 1.1em;
    }

    .highlight {
        font-size: 1.5em;
        font-weight: bold;
        color: #1a73e8;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
        font-size: 0.95em;
    }

    /* Smaller input boxes */
    .inputs input {
        width: 100%;
        max-width: 120px;
        padding: 6px;
        margin-top: 4px;
    }

    .form-text {
        font-size: 0.85em;
        color: #666;
    }

    /* Mobile */
    @media (max-width: 768px) {
        .calculator-wrapper {
            flex-direction: column;
        }
        .results {
            position: relative;
            top: 0;
            width: 100%;
        }
    }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <img src="Careview Logo.jpg" alt="Careview Logo">
    <div>
        <h1 style="margin: 0;">SyncPro Savings Calculator</h1>
        <p style="color: #666; margin-top: 5px;">
            See how much time and money you can save with automation
        </p>
    </div>
</div>

<div class="calculator-wrapper">

    <!-- LEFT: INPUTS -->
    <div class="inputs">

        <label for="numParticipants">Number of Participants</label>
        <input type="number" id="numParticipants" value="20">
        <small class="form-text">Monthly clients updated</small>

        <label for="supCategories">Support Categories</label>
        <input type="number" id="supCategories" value="3">

        <label for="numFundPeriods">Funding Periods</label>
        <input type="number" id="numFundPeriods" value="5">

        <label for="timePerCategory">Minutes per Category</label>
        <input type="number" id="timePerCategory" value="2">

        <label for="timePerPeriod">Minutes per Period</label>
        <input type="number" id="timePerPeriod" value="5">

        <label for="hourlyRate">Hourly Rate ($)</label>
        <input type="number" id="hourlyRate" value="40">

        <label for="syncTime">SyncPro Time (min)</label>
        <input type="number" id="syncTime" value="5">

    </div>

    <!-- RIGHT: RESULTS -->
    <div class="results">
        <p>Manual Cost: $<span id="manualCost"></span></p>
        <p>SyncPro Admin Cost: $<span id="autoCost"></span></p>
        <p>SyncPro Subscription: $<span id="syncProCost"></span></p>
        <p><b>Total SyncPro Cost:</b> $<span id="totalAutoCost"></span></p>

        <hr>

        <p class="highlight">Monthly Savings: $<span id="savings"></span></p>
        <p>Hours Saved per Month: <span id="hoursSaved"></span> hrs</p>

        <hr>

        <p class="highlight">Annual Savings: $<span id="annualSavings"></span></p>
        <p>Annual Hours Saved: <span id="annualHoursSaved"></span> hrs</p>
    </div>

</div>

<script>
function calculate() {
    let participants = parseFloat(document.getElementById('numParticipants').value) || 0;
    let categories = parseFloat(document.getElementById('supCategories').value) || 0;
    let periods = parseFloat(document.getElementById('numFundPeriods').value) || 0;
    let minutesPerCategory = parseFloat(document.getElementById('timePerCategory').value) || 0;
    let minutesPerFunding = parseFloat(document.getElementById('timePerPeriod').value) || 0;
    let rate = parseFloat(document.getElementById('hourlyRate').value) || 0;
    let syncTime = parseFloat(document.getElementById('syncTime').value) || 0;

    let syncCostPerParticipant = 1.5;

    let totalCategories = participants * categories;
    let categoryMinutes = totalCategories * minutesPerCategory;

    let totalFundingPeriods = totalCategories * periods;
    let fundingMinutes = totalFundingPeriods * minutesPerFunding;

    let totalManualMinutes = categoryMinutes + fundingMinutes;
    let manualHours = totalManualMinutes / 60;
    let manualCost = manualHours * rate;

    let syncHours = (participants * syncTime) / 60;
    let syncAdminCost = syncHours * rate;
    let subscriptionCost = participants * syncCostPerParticipant;

    let totalAutoCost = syncAdminCost + subscriptionCost;

    let savings = manualCost - totalAutoCost;
    let hoursSaved = manualHours - syncHours;

    let annualSavings = savings * 12;
    let annualHoursSaved = hoursSaved * 12;

    document.getElementById('manualCost').innerText = manualCost.toFixed(2);
    document.getElementById('autoCost').innerText = syncAdminCost.toFixed(2);
    document.getElementById('syncProCost').innerText = subscriptionCost.toFixed(2);
    document.getElementById('totalAutoCost').innerText = totalAutoCost.toFixed(2);
    document.getElementById('savings').innerText = savings.toFixed(2);
    document.getElementById('hoursSaved').innerText = hoursSaved.toFixed(2);
    document.getElementById('annualSavings').innerText = annualSavings.toFixed(2);
    document.getElementById('annualHoursSaved').innerText = annualHoursSaved.toFixed(2);
}

document.querySelectorAll('input').forEach(input => input.addEventListener('input', calculate));
calculate();
</script>

</body>
</html>
